name: Desktop Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: mac-arm64
            os: macos-15
            command: dist:desktop:mac:arm64
          - name: mac-x64
            os: macos-15-intel
            command: dist:desktop:mac:x64
          - name: win-x64
            os: windows-latest
            command: dist:desktop:win:x64
          - name: linux-x64
            os: ubuntu-latest
            command: dist:desktop:linux:x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.28.2
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: |
            ${{ runner.temp }}/electron-cache
            ${{ runner.temp }}/electron-builder-cache
          key: desktop-electron-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('frontend/pnpm-lock.yaml') }}
          restore-keys: |
            desktop-electron-${{ runner.os }}-${{ runner.arch }}-

      - name: Install frontend dependencies
        working-directory: frontend
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if pnpm install --frozen-lockfile; then
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            echo "pnpm install failed, retrying in $((attempt * 20)) seconds..."
            sleep $((attempt * 20))
          done
        env:
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          electron_config_cache: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Typecheck desktop app
        working-directory: frontend
        run: pnpm --filter @leros/desktop typecheck

      - name: Build desktop package
        working-directory: frontend
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if pnpm run "${{ matrix.command }}"; then
              exit 0
            fi

            status=$?
            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            echo "Desktop package build failed, retrying in $((attempt * 30)) seconds..."
            sleep $((attempt * 30))
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_CACHE: ${{ runner.temp }}/electron-cache
          electron_config_cache: ${{ runner.temp }}/electron-cache
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.name }}
          if-no-files-found: error
          path: |
            frontend/apps/desktop/dist/*.dmg
            frontend/apps/desktop/dist/*.zip
            frontend/apps/desktop/dist/*.exe
            frontend/apps/desktop/dist/*.AppImage
            frontend/apps/desktop/dist/*.deb

  upload-cos:
    name: Upload Assets to Tencent COS
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Configure COS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.TENCENT_COS_SECRET_ID }}
          aws-secret-access-key: ${{ secrets.TENCENT_COS_SECRET_KEY }}
          aws-region: ${{ secrets.TENCENT_COS_REGION }}

      - name: Upload release assets to COS
        shell: bash
        env:
          COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
          COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
          COS_PREFIX: ${{ vars.TENCENT_COS_PREFIX || 'desktop' }}
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            release_dir="${GITHUB_REF_NAME}"
          else
            release_dir="manual-${GITHUB_RUN_NUMBER}"
          fi

          aws s3 sync release-assets "s3://${COS_BUCKET}/${COS_PREFIX}/${release_dir}/" \
            --endpoint-url "https://cos.${COS_REGION}.myqcloud.com" \
            --only-show-errors

          rm -rf latest-assets
          mkdir -p latest-assets

          find release-assets -maxdepth 1 -type f ! -name "SHA256SUMS.txt" -print0 | while IFS= read -r -d '' asset; do
            filename="$(basename "$asset")"
            extension="${filename##*.}"
            basename_without_extension="${filename%.*}"
            version="${GITHUB_REF_NAME#v}"
            latest_basename="${basename_without_extension//$GITHUB_REF_NAME/latest}"
            latest_basename="${latest_basename//$version/latest}"

            if [[ "$latest_basename" == "$basename_without_extension" ]]; then
              latest_basename="${basename_without_extension}-latest"
            fi

            cp "$asset" "latest-assets/${latest_basename}.${extension}"
          done

          cd latest-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          cd -

          aws s3 sync latest-assets "s3://${COS_BUCKET}/${COS_PREFIX}/" \
            --endpoint-url "https://cos.${COS_REGION}.myqcloud.com" \
            --only-show-errors

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download package artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release-assets
          find . -type f ! -name "SHA256SUMS.txt" -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-') }}
